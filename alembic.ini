[alembic]
# Phase 1 — 单数据库 alembic 配置
# 通过 APP_ACTIVE_DB 环境变量切换目标数据库
# 实际 URL 由 migrations/env.py 中的 get_url() 动态生成

script_location = src/app/migrations

# 关闭 logging（pytest 中由 caplog 控制）
# sqlalchemy.url 在 env.py 中通过 config.get_main_option 设置

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
