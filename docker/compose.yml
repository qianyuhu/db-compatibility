# ============================================================
# Phase 1 · MSSQL 基准数据库
# ============================================================
# 启动: docker compose -f docker/compose.yml up -d
# 停止: docker compose -f docker/compose.yml down -v
#
# 注意:
# - 首次启动需要 ~30 秒（创建 SA 账户）
# - RCSI 需要手动启用（MSSQL 默认不开启 MVCC）
# ============================================================

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: dbdemo-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${APP_MSSQL_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
    ports:
      - "${APP_MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 10s
      retries: 10
      start_period: 30s

volumes:
  mssql-data:
